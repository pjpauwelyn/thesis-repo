# adaptive routing rules (set5 → v6)
#
# evaluated top-to-bottom; first match wins.
# the final fallback rule is always reached if nothing else matches.
#
# Per-agent model split
# --------------------
# model_name          : generation model
# refinement_model_name: refinement model (omit = use model_name)
#
# The profiler (OntologyConstructionAgent) and doc-filter are always
# mistral-small-latest regardless of tier — they are hardcoded in
# adaptive_pipeline.py because they are fast structured-output tasks.
#
# Model escalation rationale
# --------------------------
# tier-1-def / tier-1 : abstracts + small — definitional/factual or low
#   complexity; no PDF fetch needed, short output is sufficient.
# tier-m              : medium everywhere — explanatory catch-all.
#   UPPER BOUND REMOVED: tier-m is now the catch-all for ALL complexity >= 0.40
#   questions that were not caught by tier-3 or tier-2a. Explanatory mechanism
#   questions at cx=0.80 with low methodological_depth belong here, not tier-3.
#   mistral-medium + excerpts_narrow + use_draft=True is the right pipeline for
#   "How does X work?" questions regardless of how complex the explanation is.
# tier-2a             : high quant, low meth — medium refinement + medium
#   generation for numeric extraction and focused synthesis.
# tier-2b             : quant + focal — large refinement for spatial/temporal
#   numeric fidelity; medium generation.
# tier-3              : genuine methodology synthesis ONLY.
#   Gate: methodological_depth >= 0.55, OR (cx >= 0.75 AND meth >= 0.45),
#   OR (type in comparison/method_eval AND meth >= 0.45).
#   Rationale: full-text (35k tokens) dilutes explanatory answers; the extra
#   context only helps when the question genuinely requires cross-paper
#   methodology evaluation. large model justified only for this subset.
#
# Per-call timeouts (model-aware)
# --------------------------------
# timeout_refine_s / timeout_generate_s set the Mistral client socket
# deadline for each individual LLM call.
#
# Measured baselines (Mistral API, Apr 2026):
#   small  : TTFT ~0.3s,  ~130 tok/s  → 700 tok ≈ 6s   → 60s ceiling
#   medium : TTFT ~1.3s,  ~53 tok/s   → 700 tok ≈ 15s  → 150s ceiling
#   large  : TTFT ~30s,   ~47 tok/s   → 1000 tok ≈ 50s → 360s ceiling
#
# NOTE: safety-tier3 (confidence < 0.60) is handled directly in router.py
# and does NOT appear here. Its timeouts match tier-3 (large everywhere).
#
# Rule ordering rationale
# -----------------------
# tier-1-def  : first — catch definitional/factual + low-quant before
#               any complexity check fires (guards against profiler drift
#               that scores definitions at 0.38-0.45 instead of <0.35).
# tier-2b     : before tier-3 — quant-focal beats complex-type so a
#               high-quant focal question uses large-refine+medium-gen
#               rather than large everywhere.
# tier-3      : methodology synthesis gate (meth-driven, not cx-driven).
# tier-2a     : standalone quant catch (meth guard prevents stealing tier-3
#               questions that happen to have high quant).
# tier-m      : catch-all for cx >= 0.40 (no upper bound).
# tier-1      : low complexity <0.40.
# fallback    : always: true.

rules:

# tier-1-def: definitional or factual + low quantitativity
# Fires before tier-m to prevent profiler score drift (0.38-0.45) from
# escalating simple "what is X" questions to the medium model.
# Guard: quant < 0.45 ensures numeric-heavy definitions still reach tier-2a.
  - name: tier_1_def
    when:
      question_type: {in: [definition, factual]}
      quantitativity: {lt: 0.45}
      complexity: {lt: 0.60}
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_direct.txt
      gen_context_cap:          307200
      max_output_tokens:        450
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       45
      use_draft:                true
      rule_hit:                 tier-1-def
      reason:                   "definitional/factual + low quant -- abstracts + small (drift guard)"

# tier-2b: quantitative + spatially or temporally focal
# Large refinement model: spatial/temporal numeric fidelity requires careful
# grounding of measured values to the named region/period in the evidence.
# System prompt is a light nudge — not a hard constraint — so the model can
# still use supporting cross-regional context when it is the only evidence.
  - name: tier_2b
    when:
      quantitativity: {ge: 0.60}
      any:
        spatial_specificity:  {ge: 0.60}
        temporal_specificity: {ge: 0.60}
    config:
      model_name:               mistral-medium-latest
      refinement_model_name:    mistralai/mistral-large
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            30000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   "Pay particular attention to findings specific to the geographic region and time period named in the question. Supporting context from other regions is acceptable when it is the only available evidence."
      doc_filter_min_keep:      6
      scope_filter:             true
      synthesis_mode:           focused
      timeout_refine_s:         360
      timeout_generate_s:       150
      use_draft:                false
      rule_hit:                 tier-2b
      reason:                   "quantitative focal -- large refinement for spatial/temporal fidelity, medium generation"

# tier-3: genuine methodology synthesis
# Fires ONLY when the question requires cross-paper methodology evaluation,
# not merely for high complexity. The meth gate is the primary signal.
#
# Gate (any one of these must be true):
#   a) methodological_depth >= 0.55  (strong method-eval signal regardless of type)
#   b) complexity >= 0.75 AND meth >= 0.45  (very complex + moderate method grounding)
#   c) type in comparison/method_eval AND meth >= 0.45  (comparative synthesis needed)
#
# Why not complexity alone:
#   A mechanism question at cx=0.80 and meth=0.25 (e.g. "How does InSAR resolve
#   surface displacement?") is an explanatory question — medium model + excerpts_narrow
#   + use_draft=True is the right pipeline. Flooding it with 35k tokens of dense
#   paper text and a 1000-token output budget causes rambling over-hedged answers.
#   Only when the question genuinely needs to evaluate or compare methods across
#   papers does the large model + full excerpts earn their cost.
#
# max_output_tokens: 1000 (reduced from 1400)
#   The real length governor is the generation prompt's paragraph structure, not
#   this ceiling. 1000 tokens is sufficient for a well-structured comparative
#   analysis (approx 700-750 words). Setting it to 1400 was a hold-over from
#   when tier-3 caught all cx >= 0.60 questions and needed headroom for long
#   explanations. With tier-3 now reserved for synthesis-only questions, 1000 is
#   appropriate and prevents over-long responses on a slow/expensive model.
  - name: tier_3
    when:
      question_type: {in: [mechanism, method_eval, comparison]}
      any:
        - methodological_depth: {ge: 0.55}
        - all:
            complexity: {ge: 0.75}
            methodological_depth: {ge: 0.45}
        - all:
            question_type: {in: [comparison, method_eval]}
            methodological_depth: {ge: 0.45}
    config:
      model_name:               mistralai/mistral-large
      refinement_model_name:    mistralai/mistral-large
      evidence_mode:            excerpts_full
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            35000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        1000
      system_prompt_modifier:   "Before writing each quantitative claim, verify it appears in the provided CONTEXT. If a specific number is only in your training knowledge and not in the context, either omit it or flag it as 'estimated' — do not present it as a cited fact."
      doc_filter_min_keep:      7
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         360
      timeout_generate_s:       360
      use_draft:                false
      rule_hit:                 tier-3
      reason:                   "methodology synthesis (meth>=0.55 OR cx>=0.75+meth>=0.45 OR comparison/method_eval+meth>=0.45)"

# tier-2a: standalone high quantitativity (no strong spatial/temporal focus)
# methodological_depth guard: prevents capturing questions that also have high
# meth — those should be evaluated by tier-3 first.
  - name: tier_2a
    when:
      quantitativity: {ge: 0.55}
      methodological_depth: {lt: 0.55}
    config:
      model_name:               mistral-medium-latest
      refinement_model_name:    mistral-medium-latest
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            5
      per_doc_budget:           4500
      global_budget:            25000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   "Answer concisely and directly. Lead with the core finding in the first sentence. Verify every numeric claim against the provided context before stating it."
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         150
      timeout_generate_s:       150
      use_draft:                false
      rule_hit:                 tier-2a
      reason:                   "high quantitativity + low meth -- medium for numeric extraction"

# tier-m: explanatory catch-all for complexity >= 0.40
# UPPER BOUND REMOVED. This is now the correct home for ALL explanatory
# mechanism questions regardless of complexity score, as long as they were
# not caught by tier-3 (high meth) or tier-2a (high quant).
#
# Why this is right for cx=0.80 mechanism questions with low meth:
#   mistral-medium + excerpts_narrow + use_draft=True:
#   - draft gives structure to the explanation
#   - narrow excerpts provide grounded claims without flooding the context
#   - medium model handles explanatory prose quality perfectly well
#   - avoids the full-text dilution problem observed in experiments
  - name: tier_m
    when:
      complexity: {ge: 0.40}
    config:
      model_name:               mistral-medium-latest
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            30000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         150
      timeout_generate_s:       150
      use_draft:                true
      rule_hit:                 tier-m
      reason:                   "explanatory catch-all (cx>=0.40, low meth/quant) -- medium everywhere"

# tier-1: simple / low-complexity -- abstracts only, no PDF fetch
# Ceiling raised from 0.35 to 0.40 to absorb the profiler drift zone.
  - name: tier_1
    when:
      complexity: {lt: 0.40}
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_direct.txt
      gen_context_cap:          307200
      max_output_tokens:        450
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       45
      use_draft:                true
      rule_hit:                 tier-1
      reason:                   "simple/low-complexity (<0.40) -- abstracts + small everywhere"

# fallback: conservative default (no rule matched)
# Assumes a simple question type since no profile signal was strong enough
# to match any rule. Small model + abstracts. Wide doc keep net because
# we don't know what the question needs.
  - name: fallback
    when:
      always: true
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_direct.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       60
      use_draft:                true
      rule_hit:                 fallback
      reason:                   "no rule matched -- conservative fallback"

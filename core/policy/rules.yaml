# adaptive routing rules (set5 -> v5)
#
# evaluated top-to-bottom; first match wins.
# the final fallback rule is always reached if nothing else matches.
#
# Per-agent model split
# --------------------
# model_name          : generation model
# refinement_model_name: refinement model (omit = use model_name)
#
# The profiler (OntologyConstructionAgent) and doc-filter are always
# mistral-small-latest regardless of tier -- they are hardcoded in
# adaptive_pipeline.py because they are fast structured-output tasks.
#
# Model escalation rationale
# --------------------------
# tier-1-def / tier-1 : abstracts + small -- definitional/factual or low
#   complexity; no PDF fetch needed, short output is sufficient.
# tier-m              : medium everywhere -- mid-complexity catch-all.
# tier-2a             : high quant standalone -- medium refinement for
#   numeric extraction, small generation (short focused output).
# tier-2b             : quant + focal -- medium refinement for numeric
#   fidelity from full-text; small generation.
# tier-3              : complex mechanism/comparison -- medium refinement
#   + large generation for coherent 1400-token synthesis.
#
# Per-call timeouts (model-aware)
# --------------------------------
# timeout_refine_s / timeout_generate_s set the Mistral client socket
# deadline for each individual LLM call.
#
# Measured baselines (Mistral API, Apr 2026):
#   small  : TTFT ~0.3s,  ~130 tok/s  -> 700 tok ~6s   -> 60s ceiling
#   medium : TTFT ~1.3s,  ~53 tok/s   -> 700 tok ~15s  -> 150s ceiling
#   large  : TTFT ~30s,   ~47 tok/s   -> 1400 tok ~60s -> 360s ceiling
#
# NOTE: safety-tier3 (confidence < 0.60) is handled directly in router.py
# and does NOT appear here. Its timeouts match tier-3 (large generation).
#
# Rule ordering rationale
# -----------------------
# tier-1-def  : first -- catch definitional/factual + low-quant before
#               any complexity check fires (guards against profiler drift
#               that scores definitions at 0.38-0.45 instead of <0.35).
# tier-2b     : before tier-3 -- quant-focal beats complex-type so a
#               high-quant focal question uses medium+narrow not large.
# tier-3      : complex type check.
# tier-2a     : standalone quant catch.
# tier-m      : mid-complexity catch-all [0.40, 0.60).
# tier-1      : low complexity <0.40 (ceiling raised from 0.35 to absorb
#               profiler drift zone 0.35-0.40).
# fallback    : always: true.
#
# use_draft rationale
# -------------------
# True  (tier-1*, tier-m, fallback): thin context (abstracts / narrow
#   excerpts) -- zero-shot draft adds structure before context grounding.
# False (tier-2a, tier-2b, tier-3): rich full-text excerpts in context --
#   a zero-shot draft anchors the model to parametric memory and fights
#   grounding; skip draft and go straight to context-grounded generation.

rules:

# tier-1-def: definitional or factual + low quantitativity
# Fires before tier-m to prevent profiler score drift (0.38-0.45) from
# escalating simple "what is X" questions to the medium model.
# Guard: quant < 0.45 ensures numeric-heavy definitions still reach tier-2a.
  - name: tier_1_def
    when:
      question_type: {in: [definition, factual]}
      quantitativity: {lt: 0.45}
      complexity: {lt: 0.60}
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_direct.txt
      gen_context_cap:          307200
      max_output_tokens:        450
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       45
      use_draft:                true
      rule_hit:                 tier-1-def
      reason:                   "definitional/factual + low quant -- abstracts + small (drift guard)"

# tier-2b: quantitative + spatially or temporally focal
  - name: tier_2b
    when:
      quantitativity: {ge: 0.60}
      any:
        spatial_specificity:  {ge: 0.60}
        temporal_specificity: {ge: 0.60}
    config:
      model_name:               mistral-small-latest
      refinement_model_name:    mistral-medium-latest
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            30000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   "Focus your synthesis strictly on the specific region and/or time period named in the question. Do not extrapolate findings to other regions or periods."
      doc_filter_min_keep:      5
      scope_filter:             true
      synthesis_mode:           focused
      timeout_refine_s:         150
      timeout_generate_s:       60
      use_draft:                false
      rule_hit:                 tier-2b
      reason:                   "quantitative focal -- medium refinement for numeric fidelity, small generation"

# tier-3: complex mechanism / method-eval / comparison
  - name: tier_3
    when:
      complexity: {ge: 0.60}
      question_type: {in: [mechanism, method_eval, comparison]}
    config:
      model_name:               mistral-large-latest
      refinement_model_name:    mistral-medium-latest
      evidence_mode:            excerpts_full
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            35000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        1400
      system_prompt_modifier:   "Before writing each quantitative claim, verify it appears in the provided CONTEXT. If a specific number is only in your training knowledge and not in the context, either omit it or flag it as 'estimated' -- do not present it as a cited fact."
      doc_filter_min_keep:      5
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         150
      timeout_generate_s:       360
      use_draft:                false
      rule_hit:                 tier-3
      reason:                   "complex mechanism/comparison -- medium refinement + large generation"

# tier-2a: standalone high quantitativity
  - name: tier_2a
    when:
      quantitativity: {ge: 0.55}
    config:
      model_name:               mistral-small-latest
      refinement_model_name:    mistral-medium-latest
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            5
      per_doc_budget:           4500
      global_budget:            25000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   "Answer concisely and directly. Lead with the core finding in the first sentence. Use at most 2 short sections after the opening paragraph. Do not add an Implications section unless the question explicitly asks for one."
      doc_filter_min_keep:      4
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         150
      timeout_generate_s:       60
      use_draft:                false
      rule_hit:                 tier-2a
      reason:                   "high quantitativity -- medium refinement for numeric extraction, small generation"

# tier-m: mid-complexity catch-all [0.40, 0.60)
# Lower bound raised from 0.35 to 0.40 to match the raised tier-1 ceiling.
  - name: tier_m
    when:
      complexity: {ge: 0.40}
      complexity_lt: {lt: 0.60}
    config:
      model_name:               mistral-medium-latest
      evidence_mode:            excerpts_narrow
      top_k_per_doc:            6
      per_doc_budget:           6000
      global_budget:            30000
      refinement_prompt:        refinement_1pass_refined_fulltext.txt
      generation_prompt:        generation_structured.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   ""
      doc_filter_min_keep:      5
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         150
      timeout_generate_s:       150
      use_draft:                true
      rule_hit:                 tier-m
      reason:                   "mid-complexity [0.40, 0.60) -- medium for both agents"

# tier-1: simple / low-complexity -- abstracts only, no PDF fetch
# Ceiling raised from 0.35 to 0.40 to absorb the profiler drift zone.
  - name: tier_1
    when:
      complexity: {lt: 0.40}
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_direct.txt
      gen_context_cap:          307200
      max_output_tokens:        450
      system_prompt_modifier:   ""
      doc_filter_min_keep:      6
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       45
      use_draft:                true
      rule_hit:                 tier-1
      reason:                   "simple/low-complexity (<0.40) -- abstracts + small everywhere"

# fallback: conservative default (no rule matched)
  - name: fallback
    when:
      always: true
    config:
      model_name:               mistral-small-latest
      evidence_mode:            abstracts
      top_k_per_doc:            0
      per_doc_budget:           0
      global_budget:            0
      refinement_prompt:        refinement_1pass_refined_exp4.txt
      generation_prompt:        generation_prompt_exp4.txt
      gen_context_cap:          307200
      max_output_tokens:        700
      system_prompt_modifier:   ""
      doc_filter_min_keep:      4
      scope_filter:             false
      synthesis_mode:           homogeneous
      timeout_refine_s:         60
      timeout_generate_s:       60
      use_draft:                true
      rule_hit:                 fallback
      reason:                   "no rule matched -- conservative fallback"

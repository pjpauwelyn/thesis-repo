# adaptive routing rules (set5)
#
# evaluated top-to-bottom, first match wins.
# the final rule is the conservative set2 (ontology-enhanced rag) fallback,
# so the adaptive pipeline can never score below the current champion.
#
# thresholds are calibrated against the set2 score distribution and the
# exp3 per-criterion deltas. see prompts/ontology/extract_profile.txt for
# the rubric the profiler uses to assign these dimensions.
#
# yaml notes:
#   - {ge: x}, {gt: x}, {le: x}, {lt: x}  numeric inequality on a profile field
#   - {in: [a, b, c]}                      categorical membership
#   - any: { f1: cond, f2: cond }          ANY sub-condition must match
#   - always: true                         unconditional match
#   - complexity_lt is a router alias that re-evaluates the complexity field;
#     used so a single rule can express two inequalities on the same field
#     without a custom yaml parser.

rules:

  # tier-1: simple conceptual -- small + abstracts + direct prompt
  # protects directness (set2 mean 7.93) on definition / application questions
  # by stripping mechanism / uncertainty / implications sections.
  - name: simple_conceptual
    when:
      complexity: {lt: 0.35}
      quantitativity: {lt: 0.35}
    config:
      model_name: mistral-small-latest
      evidence_mode: abstracts
      refinement_prompt: refinement_1pass_refined_exp4.txt
      generation_prompt: generation_direct.txt
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-1
      reason: "simple conceptual -- abstracts + direct prompt"

  # tier-2a: quantitative global -- small + narrow excerpts
  # closes the quant_precision gap (set2 mean 5.93, std 1.53). exp3 showed
  # full-text adds +0.90 here. NOT spatially or temporally focal -- that
  # is tier-2b. high quant alone is sufficient (>=0.55).
  - name: quantitative_global
    when:
      quantitativity: {ge: 0.55}
      spatial_specificity: {lt: 0.5}
      temporal_specificity: {lt: 0.5}
    config:
      model_name: mistral-small-latest
      evidence_mode: excerpts_narrow
      top_k_per_doc: 6
      per_doc_budget: 6000
      global_budget: 30000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-2a
      reason: "quantitative global -- narrow excerpts, homogeneous synthesis"

  # tier-2b: quantitative focal -- small + narrow excerpts + scope filter
  # adds focused synthesis to prevent the -0.59 scope_awareness regression
  # observed when full-text excerpts pull in off-region findings.
  - name: quantitative_focal
    when:
      quantitativity: {ge: 0.55}
      any:
        spatial_specificity: {ge: 0.5}
        temporal_specificity: {ge: 0.5}
    config:
      model_name: mistral-small-latest
      evidence_mode: excerpts_narrow
      top_k_per_doc: 6
      per_doc_budget: 6000
      global_budget: 30000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      scope_filter: true
      synthesis_mode: focused
      rule_hit: tier-2b
      reason: "quantitative focal -- narrow excerpts + scope filter, focused synthesis"

  # tier-3: complex mechanism / method-eval / comparison -- large + full excerpts
  # large model is only used here, capping cost at ~15-20% of the run.
  # comparison is included because cross-study comparisons are exactly where
  # set2 scope_awareness drops the most.
  - name: complex_mechanism
    when:
      complexity: {ge: 0.6}
      question_type: {in: [mechanism, method_eval, comparison]}
    config:
      model_name: mistral-large-latest
      evidence_mode: excerpts_full
      top_k_per_doc: 10
      per_doc_budget: 9000
      global_budget: 60000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-3
      reason: "complex mechanism / comparison -- large model + full excerpts"

  # tier-m: mid-complexity bridge -- small + narrow excerpts
  # fills the 0.35..0.60 dead zone so moderately complex questions don't
  # fall through to abstracts.
  - name: complexity_medium
    when:
      complexity: {ge: 0.35}
      complexity_lt: {le: 0.6}
    config:
      model_name: mistral-small-latest
      evidence_mode: excerpts_narrow
      top_k_per_doc: 6
      per_doc_budget: 6000
      global_budget: 30000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-m
      reason: "medium complexity -- narrow excerpts bridge tier"

  # fallback: identical to set2 (ontology-enhanced rag).
  # adaptive pipeline can never score below the current champion.
  - name: fallback
    when:
      always: true
    config:
      model_name: mistral-small-latest
      evidence_mode: abstracts
      refinement_prompt: refinement_1pass_refined_exp4.txt
      generation_prompt: generation_prompt_exp4.txt
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: fallback
      reason: "no rule matched -- conservative set2 default"

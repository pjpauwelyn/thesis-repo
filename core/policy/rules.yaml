# adaptive routing rules (set5 → v2)
#
# evaluated top-to-bottom, first match wins.
# the final rule is the conservative set2 (ontology-enhanced rag) fallback.
#
# thresholds calibrated against the set2 score distribution and exp3
# per-criterion deltas.  see prompts/ontology/extract_profile.txt for
# the rubric the profiler uses to assign these dimensions.
#
# yaml notes:
#   - {ge: x}, {gt: x}, {le: x}, {lt: x}  numeric inequality on a profile field
#   - {in: [a, b, c]}                      categorical membership
#   - any: { f1: cond, f2: cond }          ANY sub-condition must match
#   - always: true                         unconditional match
#   - complexity_lt is a router alias that re-evaluates the complexity field;
#     used so a single rule can express two inequalities on the same field
#     without a custom yaml parser.

rules:

# tier-1: simple conceptual -- small + abstracts + direct prompt
  - name: tier_1
    when:
      complexity: {lt: 0.50}
    config:
      model_name: mistral-small-latest
      evidence_mode: abstracts
      top_k_per_doc: 0
      per_doc_budget: 0
      global_budget: 0
      refinement_prompt: refinement_1pass_refined_exp4.txt
      generation_prompt: generation_direct.txt
      gen_context_cap: 60000
      max_output_tokens: 450
      system_prompt_modifier: ""
      doc_filter_min_keep: 6
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-1
      reason: "simple / low-complexity -- abstracts + direct prompt"

# tier-2: moderate complexity -- small + narrow excerpts
  - name: tier_2
    when:
      complexity: {ge: 0.40}
      complexity_lt: {le: 0.64}
    config:
      model_name: mistral-small-latest
      evidence_mode: excerpts_narrow
      top_k_per_doc: 5
      per_doc_budget: 4500
      global_budget: 25000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      gen_context_cap: 200000
      max_output_tokens: 700           # ← was 900; moderate questions don't need 900
      system_prompt_modifier: "Answer concisely and directly. Lead with the core finding in the first sentence. Use at most 2 short sections after the opening paragraph. Do not add an Implications section unless the question explicitly asks for one."
      doc_filter_min_keep: 6
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-2
      reason: "moderate complexity -- narrow excerpts"

  # tier-3: complex / method-eval / comparison -- large + full excerpts
  - name: tier_3
    when:
      any:
        complexity: {ge: 0.65}
        question_type: {in: [comparison, method_eval]}
        methodological_depth: {ge: 0.60}
    config:
      model_name: mistral-large-latest
      evidence_mode: excerpts_full
      top_k_per_doc: 8
      per_doc_budget: 7000
      global_budget: 50000
      refinement_prompt: refinement_1pass_refined_fulltext.txt
      generation_prompt: generation_structured.txt
      gen_context_cap: 200000
      max_output_tokens: 1400
      system_prompt_modifier: "Before writing each quantitative claim, verify it appears in the provided CONTEXT. If a specific number is only in your training knowledge and not in the context, either omit it or flag it as 'estimated' — do not present it as a cited fact."  # ← was empty; directly targets citation hallucination
      doc_filter_min_keep: 7
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: tier-3
      reason: "complex / comparison / method-eval -- large model + full excerpts"

  # fallback: identical to set2 (ontology-enhanced rag)
  - name: fallback
    when:
      always: true
    config:
      model_name: mistral-small-latest
      evidence_mode: abstracts
      top_k_per_doc: 0
      per_doc_budget: 0
      global_budget: 0
      refinement_prompt: refinement_1pass_refined_exp4.txt
      generation_prompt: generation_prompt_exp4.txt
      gen_context_cap: 60000
      max_output_tokens: 700
      system_prompt_modifier: ""
      doc_filter_min_keep: 6
      scope_filter: false
      synthesis_mode: homogeneous
      rule_hit: fallback
      reason: "no rule matched -- conservative set2 default"